<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD9B7"/>
      <stop offset="100%" stop-color="#F2A65A"/>
    </linearGradient>
    <radialGradient id="bodyShade" cx="65%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded background tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Cat body -->
  <g transform="translate(512 600)">
    <!-- Tail -->
    <path d="M -250 80 Q -340 -60 -260 -180 Q -200 -240 -130 -210"
          fill="none" stroke="#C97A3F" stroke-width="58" stroke-linecap="round"/>
    <!-- Body (chubby) -->
    <ellipse cx="0" cy="40" rx="320" ry="240" fill="#F2A65A"/>
    <ellipse cx="0" cy="40" rx="320" ry="240" fill="url(#bodyShade)"/>
    <!-- Belly -->
    <ellipse cx="0" cy="80" rx="220" ry="150" fill="#FFE3C2"/>
    <!-- Feet -->
    <ellipse cx="-150" cy="240" rx="80" ry="34" fill="#F2A65A"/>
    <ellipse cx="150" cy="240" rx="80" ry="34" fill="#F2A65A"/>
  </g>

  <!-- Head -->
  <g transform="translate(512 360)">
    <!-- Ears -->
    <path d="M -160 -120 L -200 -260 L -90 -130 Z" fill="#F2A65A"/>
    <path d="M 160 -120 L 200 -260 L 90 -130 Z" fill="#F2A65A"/>
    <path d="M -160 -120 L -180 -200 L -110 -130 Z" fill="#FFB1C8"/>
    <path d="M 160 -120 L 180 -200 L 110 -130 Z" fill="#FFB1C8"/>
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="220" ry="190" fill="#F2A65A"/>
    <ellipse cx="0" cy="0" rx="220" ry="190" fill="url(#bodyShade)"/>
    <!-- Cheeks -->
    <circle cx="-115" cy="40" r="34" fill="#FF8FB1" opacity="0.55"/>
    <circle cx="115" cy="40" r="34" fill="#FF8FB1" opacity="0.55"/>
    <!-- Eyes -->
    <ellipse cx="-72" cy="0" rx="22" ry="30" fill="#1F1A2E"/>
    <ellipse cx="72" cy="0" rx="22" ry="30" fill="#1F1A2E"/>
    <circle cx="-65" cy="-10" r="8" fill="#FFFFFF"/>
    <circle cx="79" cy="-10" r="8" fill="#FFFFFF"/>
    <!-- Nose -->
    <path d="M -14 64 Q 0 84 14 64 Q 0 76 -14 64 Z" fill="#FF8FB1" stroke="#1F1A2E" stroke-width="3"/>
    <!-- Mouth -->
    <path d="M 0 78 q -22 28 -44 8 M 0 78 q 22 28 44 8"
          stroke="#1F1A2E" stroke-width="7" fill="none" stroke-linecap="round"/>
  </g>
</svg>
